  <script>
    // Header scroll effect
    const header = document.getElementById('header');
    const hero = document.getElementById('hero');

    window.addEventListener('scroll', () => {
      const heroBottom = hero.offsetTop + hero.offsetHeight;
      if (window.scrollY > heroBottom - 100) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });



    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // Parallax scroll effect
    const parallaxElements = document.querySelectorAll('.parallax-bg');

    function updateParallax() {
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;

      parallaxElements.forEach(el => {
        const section = el.closest('section');
        if (!section) return;

        const rect = section.getBoundingClientRect();
        const sectionTop = rect.top + scrollY;
        const sectionHeight = rect.height;

        // Only calculate if section is in or near viewport
        if (rect.bottom > -windowHeight && rect.top < windowHeight * 2) {
          const relativeScroll = scrollY - sectionTop + windowHeight;
          const parallaxOffset = relativeScroll * 0.15;
          el.style.transform = `translate3d(0, ${parallaxOffset}px, 0)`;
        }
      });

      requestAnimationFrame(updateParallax);
    }

    // Start parallax loop
    requestAnimationFrame(updateParallax);

    // Intersection Observer for fade-in animations
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animate-in');
        }
      });
    }, observerOptions);

    document.querySelectorAll('section').forEach(section => {
      observer.observe(section);
    });

    // Intersection Observer for background image reveal effects
    const revealOptions = {
      threshold: 0.15,
      rootMargin: '0px 0px -100px 0px'
    };

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          // Optionally unobserve after reveal to prevent re-triggering
          // revealObserver.unobserve(entry.target);
        }
      });
    }, revealOptions);

    // Observe sections with background images
    document.querySelectorAll('.hero, .banner, .how-we-work, .get-to-work').forEach(section => {
      revealObserver.observe(section);
    });

    // Subtle parallax on scroll for background images
    let ticking = false;

    function updateParallax() {
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;

      document.querySelectorAll('.hero, .banner, .how-we-work, .get-to-work').forEach(section => {
        const rect = section.getBoundingClientRect();
        const sectionTop = rect.top;
        const sectionHeight = rect.height;

        // Only apply parallax when section is in view
        if (sectionTop < windowHeight && sectionTop > -sectionHeight) {
          const progress = (windowHeight - sectionTop) / (windowHeight + sectionHeight);
          const bg = section.querySelector('[class$="-bg"]');

          if (bg && section.classList.contains('revealed')) {
            const parallaxAmount = (progress - 0.5) * 40; // -20px to +20px
            bg.style.transform = `translateY(${parallaxAmount}px) scale(1)`;
          }
        }
      });

      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(updateParallax);
        ticking = true;
      }
    });
  </script>
